# SITE SETUP
# Guide: https://wowchemy.com/docs/getting-started/
# Documentation: https://wowchemy.com/docs/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  # todo: custom light and dark color schemes
  theme_day: minimal
  theme_night: minimal
  font: minimal # todo: add better fonts
  font_size: L

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ""
    org_name: ""
    description: "Personal Website for Nathalie Redick"
    # twitter: 'wowchemy'
  # analytics:
  #   google_analytics: "G-5KYWLXV737"
  #   baidu_tongji: ""
  #   google_tag_manager: "G-5KYWLXV737"
  #   microsoft_clarity: ""
  verification:
    google: ""
    baidu: ""

# Site header
header:
  navbar:
    enable: true
    align: r
    show_logo: true
    show_language: false
    show_day_night: true
    show_search: true
    highlight_active_link: true

# todo: Site footer (add a connect and contact section)
footer:
  copyright:
    notice: "© {year} Nathalie Redick. Site icon: [Earth icons created by Freepik - Flaticon](https://www.flaticon.com/free-icons/earth 'earth icons')"
    license:
      enable: false
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: "02 January 2006"
  time_format: "15:04"
  address_format: en-ca

# Site features
features:
  syntax_highlighter:
    theme_light: github-light
    theme_dark: dracula
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: "https://github.com/nredick/nredick.github.io"
    content_dir: content
    branch: main
  avatar:
    gravatar: false
    shape: circle
  comment:
    provider: ""
    disqus:
      shortname: ""
      show_count: true
    commento:
      url: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
  search:
    provider: wowchemy
    algolia:
      app_id: ""
      api_key: ""
      index_name: ""
      show_logo: false
  map:
    provider: ""
    api_key: ""
    zoom: 15

# Extensions
extensions:
  cms:
    branch: main
    local_backend: false
  academicons:
    enable: true

# Security
security:
  # Allow frame for embedding speaker notes in slides
  allow_frame: false
